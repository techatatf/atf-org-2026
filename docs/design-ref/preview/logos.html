<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:#fff; padding:24px; display:flex; flex-direction:column; gap:20px; }
.row { display:flex; gap:16px; flex-wrap:wrap; align-items:center; }
.block { display:flex; flex-direction:column; align-items:flex-start; gap:6px; }
.label { font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:#737373; }
.logo-box { padding:16px; border-radius:4px; display:flex; align-items:center; justify-content:center; }
</style>
</head><body>
<div class="label">Logo Variants</div>
<div class="row">
  <div class="block">
    <div class="logo-box" style="background:#fff; border:1px solid #e5e5e5;">
      <img src="../assets/logo-full-color.png" style="height:60px; width:auto;">
    </div>
    <div class="label">Full Color</div>
  </div>
  <div class="block">
    <div class="logo-box" style="background:#0A0A0A;">
      <img src="../assets/logo-bright.png" style="height:60px; width:auto;">
    </div>
    <div class="label">White (on dark)</div>
  </div>
  <div class="block">
    <div class="logo-box" style="background:#f5f5f5; border:1px solid #e5e5e5;">
      <img src="../assets/logo-dark.png" style="height:60px; width:auto;">
    </div>
    <div class="label">Dark / Mono</div>
  </div>
  <div class="block">
    <div class="logo-box" style="background:#F90036;">
      <img src="../assets/logo-bright.png" style="height:60px; width:auto;">
    </div>
    <div class="label">White (on brand)</div>
  </div>
</div>
</body></html>
