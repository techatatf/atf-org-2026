<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:#fff; padding:20px; display:flex; flex-direction:column; gap:16px; }
.label { font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:#737373; margin-bottom:4px; }
.row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
.btn { display:inline-flex; align-items:center; justify-content:center; font-family:'Montserrat',sans-serif; font-weight:600; font-size:13px; letter-spacing:.04em; text-transform:uppercase; border-radius:4px; cursor:pointer; border:none; padding:0 20px; white-space:nowrap; }
.btn-sm  { height:32px; font-size:11px; padding:0 14px; }
.btn-md  { height:40px; }
.btn-lg  { height:48px; font-size:14px; padding:0 28px; }
.btn-primary { background:#F90036; color:#fff; }
.btn-secondary { background:#0A0A0A; color:#fff; }
.btn-outline { background:transparent; color:#F90036; border:1.5px solid #F90036; }
.btn-ghost { background:transparent; color:#0A0A0A; border:1.5px solid #E5E5E5; }
.btn-subtle { background:#FFE5EA; color:#F90036; }
.btn-disabled { background:#E5E5E5; color:#A3A3A3; cursor:not-allowed; }
</style>
</head><body>
<div class="label">Primary Variants</div>
<div class="row">
  <button class="btn btn-primary btn-md">Apply Now</button>
  <button class="btn btn-secondary btn-md">Learn More</button>
  <button class="btn btn-outline btn-md">Register</button>
  <button class="btn btn-ghost btn-md">Cancel</button>
  <button class="btn btn-subtle btn-md">View Details</button>
  <button class="btn btn-disabled btn-md">Unavailable</button>
</div>
<div class="label">Sizes</div>
<div class="row">
  <button class="btn btn-primary btn-sm">Small</button>
  <button class="btn btn-primary btn-md">Medium</button>
  <button class="btn btn-primary btn-lg">Large</button>
</div>
<div class="label">On Dark Background</div>
<div class="row" style="background:#0A0A0A; padding:12px; border-radius:4px;">
  <button class="btn btn-md" style="background:#F90036;color:#fff;font-family:'Montserrat';font-weight:600;font-size:13px;letter-spacing:.04em;text-transform:uppercase;border-radius:4px;border:none;padding:0 20px;height:40px;">Apply Now</button>
  <button class="btn btn-md" style="background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,0.3);font-family:'Montserrat';font-weight:600;font-size:13px;letter-spacing:.04em;text-transform:uppercase;border-radius:4px;padding:0 20px;height:40px;">Learn More</button>
</div>
</body></html>
