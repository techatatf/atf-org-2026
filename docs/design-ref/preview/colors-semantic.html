<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:#fff; padding:20px; display:flex; flex-direction:column; gap:16px; }
.group { display:flex; flex-direction:column; gap:6px; }
.label { font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:#737373; }
.row { display:flex; gap:6px; flex-wrap:wrap; }
.pill { display:flex; align-items:center; gap:6px; padding:6px 10px; border-radius:4px; font-size:11px; font-weight:500; }
.dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
</style>
</head><body>
<div class="group">
  <div class="label">Brand</div>
  <div class="row">
    <div class="pill" style="background:#FFF5F7;color:#0A0A0A"><div class="dot" style="background:#F90036"></div>Brand #F90036</div>
    <div class="pill" style="background:#FFF5F7;color:#0A0A0A"><div class="dot" style="background:#C0002A"></div>Hover #C0002A</div>
    <div class="pill" style="background:#FFF5F7;color:#0A0A0A"><div class="dot" style="background:#9A0022"></div>Press #9A0022</div>
    <div class="pill" style="background:#FFE5EA;color:#0A0A0A"><div class="dot" style="background:#FFE5EA;border:1px solid #F90036"></div>Tint #FFE5EA</div>
  </div>
</div>
<div class="group">
  <div class="label">Foreground</div>
  <div class="row">
    <div class="pill" style="background:#f5f5f5;color:#171717"><div class="dot" style="background:#171717"></div>fg1 — Primary</div>
    <div class="pill" style="background:#f5f5f5;color:#404040"><div class="dot" style="background:#404040"></div>fg2 — Secondary</div>
    <div class="pill" style="background:#f5f5f5;color:#737373"><div class="dot" style="background:#737373"></div>fg3 — Tertiary</div>
    <div class="pill" style="background:#171717;color:#fff"><div class="dot" style="background:#fff;border:1px solid #555"></div>Inverse</div>
  </div>
</div>
<div class="group">
  <div class="label">State</div>
  <div class="row">
    <div class="pill" style="background:#FEF2F2;color:#DC2626"><div class="dot" style="background:#DC2626"></div>Error</div>
    <div class="pill" style="background:#F0FDF4;color:#16A34A"><div class="dot" style="background:#16A34A"></div>Success</div>
    <div class="pill" style="background:#FFFBEB;color:#D97706"><div class="dot" style="background:#D97706"></div>Warning</div>
    <div class="pill" style="background:#EFF6FF;color:#2563EB"><div class="dot" style="background:#2563EB"></div>Info</div>
  </div>
</div>
</body></html>
