<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:#fff; padding:20px; display:flex; flex-direction:column; gap:14px; }
.label { font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:#737373; margin-bottom:4px; }
.row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.badge { display:inline-flex; align-items:center; font-size:11px; font-weight:500; padding:3px 10px; border-radius:9999px; white-space:nowrap; }
.badge-sm { font-size:9px; padding:2px 7px; }
.badge-outline { border-width:1px; border-style:solid; background:transparent; }
</style>
</head><body>
<div class="label">Status Badges</div>
<div class="row">
  <span class="badge" style="background:#FFE5EA;color:#F90036">Upcoming</span>
  <span class="badge" style="background:#F0FDF4;color:#16A34A">Open</span>
  <span class="badge" style="background:#FFFBEB;color:#D97706">Closing Soon</span>
  <span class="badge" style="background:#FEF2F2;color:#DC2626">Closed</span>
  <span class="badge" style="background:#F5F5F5;color:#525252">Archived</span>
  <span class="badge" style="background:#EFF6FF;color:#2563EB">Featured</span>
</div>
<div class="label">Category Tags</div>
<div class="row">
  <span class="badge" style="background:#0A0A0A;color:#fff">Innovation</span>
  <span class="badge" style="background:#F90036;color:#fff">Summit</span>
  <span class="badge badge-outline" style="border-color:#F90036;color:#F90036">Fellowship</span>
  <span class="badge badge-outline" style="border-color:#E5E5E5;color:#525252">Research</span>
  <span class="badge badge-outline" style="border-color:#E5E5E5;color:#525252">Policy</span>
  <span class="badge badge-outline" style="border-color:#E5E5E5;color:#525252">STEM</span>
</div>
<div class="label">Small / Counts</div>
<div class="row">
  <span class="badge badge-sm" style="background:#FFE5EA;color:#F90036">New</span>
  <span class="badge badge-sm" style="background:#F5F5F5;color:#525252">42 Members</span>
  <span class="badge badge-sm" style="background:#0A0A0A;color:#fff">Pro</span>
  <span class="badge badge-sm" style="background:#F90036;color:#fff">Live</span>
</div>
</body></html>
