<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:#f5f5f5; display:flex; flex-direction:column; gap:0; }

/* Desktop Nav */
nav.desktop { background:#fff; border-bottom:1px solid #E5E5E5; height:64px; display:flex; align-items:center; padding:0 32px; gap:40px; }
.nav-logo { display:flex; align-items:center; gap:0; }
.nav-logo img { height:32px; width:auto; }
.nav-links { display:flex; gap:28px; flex:1; }
.nav-link { font-family:'Montserrat',sans-serif; font-size:12px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:#404040; text-decoration:none; }
.nav-link.active { color:#F90036; }
.nav-actions { display:flex; gap:10px; align-items:center; }
.btn-nav { font-family:'Montserrat',sans-serif; font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; border-radius:4px; padding:0 16px; height:36px; cursor:pointer; display:inline-flex; align-items:center; border:none; }

/* Dark Nav */
nav.dark { background:#0A0A0A; border-bottom:1px solid #1f1f1f; height:64px; display:flex; align-items:center; padding:0 32px; gap:40px; }

/* Red Nav */
nav.brand { background:#F90036; height:64px; display:flex; align-items:center; padding:0 32px; gap:40px; }

.divider { height:1px; background:#e5e5e5; }
.spacer { height:8px; }
</style>
</head><body>

<!-- Light nav -->
<nav class="desktop">
  <div class="nav-logo"><img src="../assets/logo-full-color.png"></div>
  <div class="nav-links">
    <a class="nav-link active" href="#">Programs</a>
    <a class="nav-link" href="#">Events</a>
    <a class="nav-link" href="#">Research</a>
    <a class="nav-link" href="#">About</a>
  </div>
  <div class="nav-actions">
    <button class="btn-nav" style="background:transparent;color:#0A0A0A;border:1.5px solid #E5E5E5;">Sign In</button>
    <button class="btn-nav" style="background:#F90036;color:#fff;">Apply Now</button>
  </div>
</nav>

<div class="spacer"></div>

<!-- Dark nav -->
<nav class="dark">
  <div class="nav-logo"><img src="../assets/logo-bright.png"></div>
  <div class="nav-links">
    <a class="nav-link" style="color:#fff" href="#">Programs</a>
    <a class="nav-link" style="color:#F90036" href="#">Events</a>
    <a class="nav-link" style="color:#A3A3A3" href="#">Research</a>
    <a class="nav-link" style="color:#A3A3A3" href="#">About</a>
  </div>
  <div class="nav-actions">
    <button class="btn-nav" style="background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,0.2);">Sign In</button>
    <button class="btn-nav" style="background:#F90036;color:#fff;">Apply Now</button>
  </div>
</nav>

<div class="spacer"></div>

<!-- Brand red nav -->
<nav class="brand">
  <div class="nav-logo"><img src="../assets/logo-bright.png"></div>
  <div class="nav-links">
    <a class="nav-link" style="color:rgba(255,255,255,0.7)" href="#">Programs</a>
    <a class="nav-link" style="color:#fff" href="#">Events</a>
    <a class="nav-link" style="color:rgba(255,255,255,0.7)" href="#">Research</a>
    <a class="nav-link" style="color:rgba(255,255,255,0.7)" href="#">About</a>
  </div>
  <div class="nav-actions">
    <button class="btn-nav" style="background:rgba(255,255,255,0.15);color:#fff;border:none;">Sign In</button>
    <button class="btn-nav" style="background:#fff;color:#F90036;">Apply Now</button>
  </div>
</nav>

</body></html>
