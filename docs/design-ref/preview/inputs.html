<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:#fff; padding:20px; display:flex; flex-direction:column; gap:14px; }
.label { font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:#737373; margin-bottom:2px; }
.row { display:flex; gap:10px; flex-wrap:wrap; }
.field { display:flex; flex-direction:column; gap:4px; flex:1; min-width:160px; }
.field label { font-size:12px; font-weight:500; color:#404040; }
.input { height:40px; border:1px solid #E5E5E5; border-radius:4px; padding:0 12px; font-family:'DM Sans',sans-serif; font-size:14px; color:#171717; background:#fff; outline:none; width:100%; }
.input::placeholder { color:#A3A3A3; }
.input-focus { border-color:#F90036; box-shadow:0 0 0 2px rgba(249,0,54,0.15); }
.input-error { border-color:#DC2626; }
.input-disabled { background:#F5F5F5; color:#A3A3A3; cursor:not-allowed; }
.hint { font-size:11px; color:#737373; }
.hint-error { font-size:11px; color:#DC2626; }
textarea.input { height:72px; padding:8px 12px; resize:none; }
</style>
</head><body>
<div class="label">Input States</div>
<div class="row">
  <div class="field">
    <label>Default</label>
    <input class="input" placeholder="e.g. Nairobi, Kenya">
  </div>
  <div class="field">
    <label>Focused</label>
    <input class="input input-focus" value="Dr. Amara Diallo">
  </div>
  <div class="field">
    <label>Error</label>
    <input class="input input-error" value="invalid@">
    <span class="hint-error">Enter a valid email address.</span>
  </div>
  <div class="field">
    <label>Disabled</label>
    <input class="input input-disabled" value="Read only" disabled>
    <span class="hint">Field is locked</span>
  </div>
</div>
<div class="label">Select & Textarea</div>
<div class="row">
  <div class="field">
    <label>Country</label>
    <select class="input"><option>Nigeria</option><option>Kenya</option><option>Ghana</option></select>
  </div>
  <div class="field" style="flex:2">
    <label>Bio</label>
    <textarea class="input" placeholder="Tell us about yourself…"></textarea>
  </div>
</div>
</body></html>
