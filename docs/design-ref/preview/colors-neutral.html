<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:#fff; padding:20px; }
.row { display:flex; gap:8px; flex-wrap:wrap; }
.swatch { flex:1; min-width:55px; border-radius:4px; overflow:hidden; }
.chip { height:56px; }
.info { padding:6px 4px; }
.name { font-size:10px; font-weight:500; color:#404040; }
.val  { font-size:10px; color:#737373; }
.section-label { font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:#737373; margin-bottom:8px; }
</style>
</head><body>
<div class="section-label">Neutral Scale</div>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#0A0A0A"></div><div class="info"><div class="name">Black</div><div class="val">#0A0A0A</div></div></div>
  <div class="swatch"><div class="chip" style="background:#171717"></div><div class="info"><div class="name">Gray 900</div><div class="val">#171717</div></div></div>
  <div class="swatch"><div class="chip" style="background:#262626"></div><div class="info"><div class="name">Gray 800</div><div class="val">#262626</div></div></div>
  <div class="swatch"><div class="chip" style="background:#404040"></div><div class="info"><div class="name">Gray 700</div><div class="val">#404040</div></div></div>
  <div class="swatch"><div class="chip" style="background:#525252"></div><div class="info"><div class="name">Gray 600</div><div class="val">#525252</div></div></div>
  <div class="swatch"><div class="chip" style="background:#737373"></div><div class="info"><div class="name">Gray 500</div><div class="val">#737373</div></div></div>
  <div class="swatch"><div class="chip" style="background:#A3A3A3"></div><div class="info"><div class="name">Gray 400</div><div class="val">#A3A3A3</div></div></div>
  <div class="swatch"><div class="chip" style="background:#D4D4D4"></div><div class="info"><div class="name">Gray 300</div><div class="val">#D4D4D4</div></div></div>
  <div class="swatch"><div class="chip" style="background:#E5E5E5"></div><div class="info"><div class="name">Gray 200</div><div class="val">#E5E5E5</div></div></div>
  <div class="swatch"><div class="chip" style="background:#F5F5F5; border:1px solid #e5e5e5;"></div><div class="info"><div class="name">Gray 100</div><div class="val">#F5F5F5</div></div></div>
  <div class="swatch"><div class="chip" style="background:#FAFAFA; border:1px solid #e5e5e5;"></div><div class="info"><div class="name">Gray 50</div><div class="val">#FAFAFA</div></div></div>
  <div class="swatch"><div class="chip" style="background:#FFFFFF; border:1px solid #e5e5e5;"></div><div class="info"><div class="name">White</div><div class="val">#FFFFFF</div></div></div>
</div>
</body></html>
