<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:#fff; padding:20px; display:flex; flex-direction:column; gap:14px; }
.label { font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:#737373; margin-bottom:6px; }
.row { display:flex; gap:4px; align-items:flex-end; flex-wrap:wrap; }
.token { display:flex; flex-direction:column; align-items:center; gap:4px; }
.bar { background:#F90036; border-radius:2px; width:36px; }
.val { font-size:9px; color:#737373; }
.name { font-size:9px; font-weight:600; color:#404040; }
.divider { height:1px; background:#f0f0f0; }
.radii { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
.radius-box { display:flex; flex-direction:column; align-items:center; gap:6px; }
.rbox { width:44px; height:44px; background:#FFE5EA; border:1.5px solid #F90036; }
</style>
</head><body>
<div class="label">Spacing Scale</div>
<div class="row">
  <div class="token"><div class="bar" style="height:4px"></div><div class="val">4px</div><div class="name">space-1</div></div>
  <div class="token"><div class="bar" style="height:8px"></div><div class="val">8px</div><div class="name">space-2</div></div>
  <div class="token"><div class="bar" style="height:12px"></div><div class="val">12px</div><div class="name">space-3</div></div>
  <div class="token"><div class="bar" style="height:16px"></div><div class="val">16px</div><div class="name">space-4</div></div>
  <div class="token"><div class="bar" style="height:24px"></div><div class="val">24px</div><div class="name">space-6</div></div>
  <div class="token"><div class="bar" style="height:32px"></div><div class="val">32px</div><div class="name">space-8</div></div>
  <div class="token"><div class="bar" style="height:48px"></div><div class="val">48px</div><div class="name">space-12</div></div>
  <div class="token"><div class="bar" style="height:64px"></div><div class="val">64px</div><div class="name">space-16</div></div>
  <div class="token"><div class="bar" style="height:80px"></div><div class="val">80px</div><div class="name">space-20</div></div>
  <div class="token"><div class="bar" style="height:96px"></div><div class="val">96px</div><div class="name">space-24</div></div>
</div>
<div class="divider"></div>
<div class="label">Border Radius</div>
<div class="radii">
  <div class="radius-box"><div class="rbox" style="border-radius:2px"></div><div class="val">2px</div><div class="name">sm</div></div>
  <div class="radius-box"><div class="rbox" style="border-radius:4px"></div><div class="val">4px</div><div class="name">md</div></div>
  <div class="radius-box"><div class="rbox" style="border-radius:8px"></div><div class="val">8px</div><div class="name">lg</div></div>
  <div class="radius-box"><div class="rbox" style="border-radius:12px"></div><div class="val">12px</div><div class="name">xl</div></div>
  <div class="radius-box"><div class="rbox" style="border-radius:9999px"></div><div class="val">9999px</div><div class="name">pill</div></div>
</div>
</body></html>
