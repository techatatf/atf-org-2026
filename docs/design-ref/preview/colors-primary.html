<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:#fff; padding:20px; }
.row { display:flex; gap:8px; flex-wrap:wrap; }
.swatch { flex:1; min-width:60px; border-radius:4px; overflow:hidden; }
.chip { height:56px; width:100%; }
.info { padding:6px 4px; }
.name { font-size:10px; font-weight:500; color:#404040; }
.val  { font-size:10px; color:#737373; }
.section-label { font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:#737373; margin-bottom:8px; margin-top:16px; }
.section-label:first-child { margin-top:0; }
</style>
</head><body>
<div class="section-label">Brand Red Scale</div>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#6B0016"></div><div class="info"><div class="name">Red 900</div><div class="val">#6B0016</div></div></div>
  <div class="swatch"><div class="chip" style="background:#9A0022"></div><div class="info"><div class="name">Red 800</div><div class="val">#9A0022</div></div></div>
  <div class="swatch"><div class="chip" style="background:#C0002A"></div><div class="info"><div class="name">Red 700</div><div class="val">#C0002A</div></div></div>
  <div class="swatch"><div class="chip" style="background:#E8002F"></div><div class="info"><div class="name">Red 600</div><div class="val">#E8002F</div></div></div>
  <div class="swatch"><div class="chip" style="background:#F90036; outline:2px solid #F90036; outline-offset:2px; border-radius:2px;"></div><div class="info"><div class="name" style="color:#F90036;font-weight:700">Red 500 ★</div><div class="val">#F90036</div></div></div>
  <div class="swatch"><div class="chip" style="background:#FF3358"></div><div class="info"><div class="name">Red 400</div><div class="val">#FF3358</div></div></div>
  <div class="swatch"><div class="chip" style="background:#FF6680"></div><div class="info"><div class="name">Red 300</div><div class="val">#FF6680</div></div></div>
  <div class="swatch"><div class="chip" style="background:#FFB3C0"></div><div class="info"><div class="name">Red 200</div><div class="val">#FFB3C0</div></div></div>
  <div class="swatch"><div class="chip" style="background:#FFE5EA"></div><div class="info"><div class="name">Red 100</div><div class="val">#FFE5EA</div></div></div>
  <div class="swatch"><div class="chip" style="background:#FFF5F7; border:1px solid #e5e5e5;"></div><div class="info"><div class="name">Red 50</div><div class="val">#FFF5F7</div></div></div>
</div>
</body></html>
