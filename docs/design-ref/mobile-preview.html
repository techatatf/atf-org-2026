<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATF — Mobile Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }
    .phone {
      width: 390px;
      height: 844px;
      max-height: calc(100vh - 64px);
      background: #000;
      border-radius: 46px;
      padding: 12px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 0 2px #2a2a2a;
      position: relative;
    }
    .phone::before {
      content: '';
      position: absolute;
      top: 22px; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 30px;
      background: #000;
      border-radius: 16px;
      z-index: 3;
    }
    .screen {
      width: 100%;
      height: 100%;
      border-radius: 36px;
      overflow: hidden;
      background: #fff;
    }
    .screen iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="screen">
      <iframe src="ATF Website v2.html" title="ATF mobile"></iframe>
    </div>
  </div>
</body>
</html>
